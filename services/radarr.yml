# Il faut obtenir la clé API Radarr pour configurer le widget dans le tableau de bord.
# Pour obtenir la clé API, accéder à Radarr après le démarrage du conteneur:
# http://localhost:7878
# Aller dans Settings -> General -> Security -> API Key
# Copier la clé API et la coller dans le fichier init-dashboard.yml

services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ} 
    volumes:
      - radarr_config:/config
      - /path/to/movies:/movies
      - /path/to/downloads:/downloads
    ports:
      - "7878:7878"
    networks:
      - reseauWP

volumes:
  radarr_config: