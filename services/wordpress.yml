# WordPress, phpmyadmin et MariaDB
# Il faut utiliser les variables d'environnement
# Pour l'accès à la BD et la configuration de WordPress
# WordPress et phpmyadmin dépendent de la base de données MariaDB
# Le réseau reseauWP est utilisé pour isoler les services WordPress, phpmyadmin et MariaDB
services:

  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wpuser
      MARIADB_PASSWORD: wppassword
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - reseauWP

  wordpress:
    image: wordpress:latest
    container_name: wordpress
    restart: always
    depends_on:
      - mariadb
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword
      WORDPRESS_DB_NAME: wordpress
    ports:
      - "8000:80"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - reseauWP

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
    ports:
      - "8080:80"
    networks:
      - reseauWP

volumes:
  mariadb_data:
  wordpress_data: